name: Bump Version

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump:
    name: Bump package version and tag
    runs-on: windows-latest
    if: github.actor != 'github-actions[bot]'
    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        shell: pwsh
        run: |
          $bump = "${{ inputs.bump }}"
          if (-not $bump) { $bump = "patch" }
          npm version $bump -m "chore: release v%s"
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Push commit and tag
        shell: pwsh
        run: |
          git push
          git push --tags

      - name: Install dependencies
        run: npm ci

      - name: Build installer and portable zip
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify versioned artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $expected = @(
            "release/MarkDo-$version-x64-Setup.exe",
            "release/MarkDo-$version-x64-Portable.zip"
          )
          foreach ($file in $expected) {
            if (-not (Test-Path $file)) {
              Write-Error "Missing expected artifact: $file"
            }
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MarkDo-windows-v${{ steps.version.outputs.version }}
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MarkDo v${{ steps.version.outputs.version }}
          files: |
            release/*.exe
            release/*.zip
          fail_on_unmatched_files: true
