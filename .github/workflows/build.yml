name: Build MarkDo

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows package
    runs-on: windows-latest
    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer and portable zip
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify versioned artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $expected = @(
            "release/MarkDo-$version-x64-Setup.exe",
            "release/MarkDo-$version-x64-Portable.zip"
          )
          foreach ($file in $expected) {
            if (-not (Test-Path $file)) {
              Write-Error "Missing expected artifact: $file"
            }
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MarkDo-windows-v${{ steps.version.outputs.version }}
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MarkDo v${{ steps.version.outputs.version }}
          files: |
            release/*.exe
            release/*.zip
          fail_on_unmatched_files: true
